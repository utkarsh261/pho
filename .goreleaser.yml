version: 2
project_name: pho

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: pho
    main: ./cmd/pho
    binary: pho
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}{{ .Os }}{{ end }}_
      {{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [README.md, LICENSE*]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude: ["^docs:", "^test:", "^chore:", "Merge pull request", "Merge branch"]

release:
  github:
    owner: utkarsh261
    name: pho
  prerelease: auto
